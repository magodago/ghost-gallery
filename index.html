<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3, user-scalable=yes, viewport-fit=cover">
<title>Galería</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro',Helvetica,Arial,sans-serif;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation}

/* ── STATUS BAR ── */
.status-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:12px 20px 0;height:50px;
  display:flex;justify-content:space-between;
  font-size:12px;font-weight:600;color:#fff;
}
.status-bar .time{font-size:14px;font-weight:700;letter-spacing:0.3px;}
.status-bar .right{display:flex;align-items:center;gap:6px;font-size:12px;}

/* ── HEADER ── */
.header{
  position:fixed;top:48px;left:0;right:0;z-index:90;
  padding:8px 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(0,0,0,0.6) 0%,transparent 100%);
}
.header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;}
.header-actions{display:flex;gap:16px;}
.header-actions button{background:none;border:none;color:#fff;font-size:20px;padding:4px;cursor:pointer;}

/* ── GALLERY GRID ── */
.gallery-wrap{
  position:fixed;inset:0;top:0;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.1s ease;
}
.gallery-grid{
  display:grid;
  gap:2px;
  padding:2px;
  transition:all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
  width:100%;height:100%;
  grid-template-columns:repeat(3,1fr);
  grid-auto-rows:1fr;
}

/* One tile = one photo */
.tile{
  position:relative;overflow:hidden;
  background:var(--bg,#1a1a2e);
  border-radius:0;
  cursor:pointer;
  transition:transform 0.2s ease,border-radius 0.3s ease,box-shadow 0.3s ease;
}
.tile img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease;}
.tile:active{transform:scale(0.97);}

/* ── MOSAIC ZOOM MODE ── */
.gallery-wrap.zoomed .gallery-grid{
  grid-template-columns:repeat(12,1fr) !important;
  gap:1px;
  border-radius:0;
}
.gallery-wrap.zoomed .tile{border-radius:0;}
.gallery-wrap.zoomed .tile img{object-fit:cover;}

/* ── SINGLE PHOTO VIEW ── */
.photo-view{
  position:fixed;inset:0;z-index:50;
  background:#000;display:none;
  align-items:center;justify-content:center;
}
.photo-view.open{display:flex;}
.photo-view img{max-width:100%;max-height:100%;object-fit:contain;}
.photo-view-close{
  position:absolute;top:54px;right:16px;z-index:55;
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,0.15);border:none;color:#fff;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(60px);
  z-index:200;padding:10px 20px;border-radius:30px;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);
  font-size:13px;color:#fff;text-align:center;
  opacity:0;pointer-events:none;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
  max-width:80vw;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── RECEIVING OVERLAY ── */
.receiving{
  position:fixed;inset:0;z-index:60;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(30px);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.receiving.show{display:flex;}
.receiving .pulse{
  width:60px;height:60px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.3);
  animation:pulse 1.5s ease-in-out infinite;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.15);opacity:1}}
.receiving p{font-size:15px;color:rgba(255,255,255,0.6);}
.receiving .target-name{font-size:28px;font-weight:700;color:#fff;margin-top:4px;}

/* ── ZOOM HINT ── */
.zoom-hint{
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  z-index:30;padding:8px 20px;border-radius:20px;
  background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);
  font-size:12px;color:rgba(255,255,255,0.5);
  pointer-events:none;transition:opacity 0.5s;
  white-space:nowrap;
}
.zoom-hint.hidden{opacity:0;}
</style>
</head>
<body>

<!-- STATUS BAR -->
<div class="status-bar">
  <span class="time" id="statusTime">9:41</span>
  <div class="right">
    <span id="statusBattery">86%</span>
    <svg viewBox="0 0 24 12" style="width:22px;height:11px;"><rect x="0.5" y="0.5" width="19" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1"/><rect x="20" y="3.5" width="2" height="5" rx="0.8" fill="currentColor"/><rect x="2" y="2.5" width="16" height="7" rx="1" fill="currentColor" id="batFill"/></svg>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Álbumes</h1>
  <div class="header-actions">
    <button onclick="toggleMosaic()" title="Mosaico">⊞</button>
    <button onclick="manualInject()" title="Inyectar">+</button>
  </div>
</div>

<!-- GALLERY -->
<div class="gallery-wrap" id="galleryWrap">
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<!-- SINGLE PHOTO VIEW -->
<div class="photo-view" id="photoView">
  <button class="photo-view-close" onclick="closePhoto()">✕</button>
  <img id="photoViewImg" src="" alt="">
</div>

<!-- RECEIVING OVERLAY -->
<div class="receiving" id="receivingOverlay">
  <div class="pulse">📡</div>
  <p>Recibiendo señal...</p>
  <div class="target-name" id="targetName"></div>
</div>

<!-- ZOOM HINT -->
<div class="zoom-hint" id="zoomHint">Aleja con dos dedos para ver el mosaico</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// ── STATE ──
let photoCount = 36; // show 36 photos initially (6x6 grid)
let currentTarget = null;
let mosaicActive = false;
let tileSize = 3; // 3x3 grid when in gallery mode
let zoomLevel = 1;

// ── RENDER ──
function renderGallery(){
  const grid = document.getElementById('galleryGrid');
  const cols = mosaicActive ? 12 : 3;
  const total = mosaicActive ? 144 : Math.min(photoCount, 144);
  
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  
  let html = '';
  for(let i = 0; i < total; i++){
    const imgUrl = MY_PHOTOS[i % MY_PHOTOS.length];
    const delay = mosaicActive ? (i * 15) : 0;
    html += `<div class="tile" style="animation-delay:${delay}ms;--bg:${mosaicActive ? getTileColor(i, total) : '#1a1a2e'}" onclick="openPhoto('${imgUrl}')">
      <img src="${imgUrl}" alt="Photo ${i+1}" loading="lazy">
    </div>`;
  }
  grid.innerHTML = html;
  
  // Show/hide zoom hint
  document.getElementById('zoomHint').classList.toggle('hidden', mosaicActive);
}

// Generate tile color for mosaic simulation
function getTileColor(index, total){
  // Create a pattern based on index to simulate a mosaic face
  const cols = 12;
  const row = Math.floor(index / cols);
  const col = index % cols;
  const gridSize = cols;
  const cx = gridSize / 2;
  const cy = gridSize / 2;
  const dist = Math.sqrt((col-cx)**2 + (row-cy)**2)/gridSize*3;
  const angle = Math.atan2(row-cy, col-cx);
  const r = Math.floor(128 + 80*Math.sin(angle+dist*2));
  const g = Math.floor(100 + 60*Math.cos(dist*3+angle));
  const b = Math.floor(80 + 100*Math.sin(dist*4));
  return `rgb(${r},${g},${b})`;
}

// ── TOGGLE MOSAIC ──
function toggleMosaic(){
  mosaicActive = !mosaicActive;
  const wrap = document.getElementById('galleryWrap');
  wrap.classList.toggle('zoomed', mosaicActive);
  
  if(mosaicActive && currentTarget){
    document.getElementById('receivingOverlay').classList.add('show');
    document.getElementById('targetName').textContent = currentTarget;
    setTimeout(() => {
      document.getElementById('receivingOverlay').classList.remove('show');
    }, 2000);
  }
  
  renderGallery();
}

// ── PINCH TO ZOOM ──
let lastDist = 0;
document.addEventListener('touchstart', (e) => {
  if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastDist = Math.sqrt(dx*dx + dy*dy);
  }
}, {passive:true});

document.addEventListener('touchmove', (e) => {
  if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    if(lastDist > 0){
      const scale = dist / lastDist;
      if(scale < 0.7 && !mosaicActive){
        // Pinch IN → activate mosaic
        toggleMosaic();
      } else if(scale > 1.4 && mosaicActive){
        // Pinch OUT → deactivate mosaic
        toggleMosaic();
      }
    }
    lastDist = dist;
  }
}, {passive:true});

document.addEventListener('touchend', () => { lastDist = 0; }, {passive:true});

// ── PHOTO VIEW ──
function openPhoto(url){
  const pv = document.getElementById('photoView');
  document.getElementById('photoViewImg').src = url;
  pv.classList.add('open');
}
function closePhoto(){
  document.getElementById('photoView').classList.remove('open');
}

// ── CLOCK ──
function updateClock(){
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('statusTime').textContent = `${h}:${m}`;
}
setInterval(updateClock,1000);
updateClock();

// ── PROCESS TARGET ──
function processTarget(value){
  currentTarget = value;
  
  // Show receiving overlay
  const overlay = document.getElementById('receivingOverlay');
  document.getElementById('targetName').textContent = value;
  overlay.classList.add('show');
  
  // Activate mosaic after a beat
  setTimeout(() => {
    if(!mosaicActive) toggleMosaic();
    overlay.classList.remove('show');
    showToast(`🔮 ${value}`);
  }, 1500);
}

// ── MANUAL INJECT ──
function manualInject(){
  const v = prompt('Target:');
  if(v && v.trim()) processTarget(v.trim());
}

// ── WEBSOCKET ──
let ws;
function connectWS(){
  try{
    ws = new WebSocket('wss://echo.websocket.events');
    ws.onmessage = (e) => {
      try{
        const data = JSON.parse(e.data);
        const val = data.value || data.target || data.text || data.message;
        if(val && typeof val === 'string') processTarget(val);
      } catch {
        if(typeof e.data === 'string' && e.data.length < 100) processTarget(e.data.trim());
      }
    };
    ws.onclose = () => setTimeout(connectWS, 5000);
  } catch(e){ setTimeout(connectWS, 5000); }
}
connectWS();

// ── TOAST ──
let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── KEYBOARD ──
document.addEventListener('keydown', (e) => {
  if(e.key === 'm' || e.key === 'M') toggleMosaic();
  if(e.key === 'i' || e.key === 'I') manualInject();
  if(e.key === 'Escape') closePhoto();
});

// ── EXPOSE ──
window.inject = processTarget;
window.toggleMosaic = toggleMosaic;

// ── INIT ──
renderGallery();
showToast('📸 Galería lista');
</script>
</body>
</html>
