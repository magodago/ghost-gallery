<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3, user-scalable=yes, viewport-fit=cover">
<title>Fotos</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation}

/* Status bar */
.status{padding:54px 16px 0 16px;display:flex;justify-content:space-between;font-size:12px;position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,rgba(0,0,0,0.5) 0%,transparent 100%);height:80px;}

/* Nav */
.nav{position:fixed;top:54px;left:0;right:0;z-index:99;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.nav h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;}
.nav-actions{display:flex;gap:8px;}
.nav-actions button{background:rgba(255,255,255,0.08);border:none;color:#007aff;font-size:14px;padding:6px 12px;border-radius:50px;cursor:pointer;font-weight:500;}
.nav-actions button.orange{color:#ff9500;background:rgba(255,149,0,0.12);}

/* Scroll area */
.scroll{position:fixed;top:98px;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}

/* Photo grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;}
.item{aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative;}
.item:active{opacity:0.7;}
.item img{width:100%;height:100%;object-fit:cover;display:block;}

/* Viewer */
.viewer{
  position:fixed;inset:0;z-index:200;background:#000;
  display:none;flex-direction:column;
}
.viewer.open{display:flex;}
.viewer-top{position:absolute;top:0;left:0;right:0;z-index:10;height:100px;background:linear-gradient(180deg,rgba(0,0,0,0.5),transparent);display:flex;justify-content:space-between;align-items:flex-start;padding:54px 16px 0;}
.viewer-top button{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;}
.viewer-img{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.viewer-img img{max-width:100%;max-height:100%;object-fit:contain;transition:transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);}

/* Mosaic overlay (hidden by default) */
.mosaic-overlay{
  position:absolute;inset:0;z-index:5;
  opacity:0;pointer-events:none;transition:opacity 0.5s ease;
  display:flex;align-items:center;justify-content:center;
  background:#000;
}
.mosaic-overlay.active{opacity:1;pointer-events:auto;}
.mosaic-overlay img{max-width:100%;max-height:100%;object-fit:contain;}

/* Receiving */
.receiving{
  position:fixed;inset:0;z-index:150;background:rgba(0,0,0,0.85);backdrop-filter:blur(40px);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.receiving.show{display:flex;}
.receiving .pulse{width:70px;height:70px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:30px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.1);opacity:1}}
.receiving p{font-size:14px;color:rgba(255,255,255,0.4);}
.receiving .target{font-size:36px;font-weight:700;color:#fff;}

/* Toast */
.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(40px);z-index:300;padding:10px 20px;border-radius:16px;background:rgba(40,40,40,0.95);backdrop-filter:blur(20px);font-size:13px;color:#fff;opacity:0;pointer-events:none;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Zoom hint */
.zoom-hint{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:6;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);font-size:11px;color:rgba(255,255,255,0.4);pointer-events:none;white-space:nowrap;transition:opacity 0.3s;}
.zoom-hint.hidden{opacity:0;}
</style>
</head>
<body>

<div class="status"><span id="sTime">9:41</span><span id="sBat">87%</span></div>

<div class="nav">
  <h1>Fotos</h1>
  <div class="nav-actions">
    <button onclick="manualInject()" class="orange">+</button>
  </div>
</div>

<div class="scroll" id="scroll">
  <div class="grid" id="grid"></div>
</div>

<div class="viewer" id="viewer">
  <div class="viewer-top">
    <button onclick="closeViewer()">✕</button>
    <button onclick="manualInject()" style="color:#ff9500;">+</button>
  </div>
  <div class="viewer-img" id="viewerImg">
    <img id="vImg" src="" alt="">
    <div class="mosaic-overlay" id="mosaicOverlay">
      <img id="mosaicImg" src="" alt="">
    </div>
    <div class="zoom-hint" id="zoomHint">Aleja con dos dedos</div>
  </div>
</div>

<div class="receiving" id="receiving">
  <div class="pulse">📡</div>
  <p>Recibiendo señal...</p>
  <div class="target" id="rTarget"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════
//  GHOST GALLERY — Versión real
// ═══════════════════════════════════

// Your photos (100 picsum placeholders — replace with yours!)
const PHOTOS = Array.from({length:72}, (_,i) =>
  `https://picsum.photos/id/${(i*7 % 500) + 10}/400/400`
);

// Pre-generated mosaics manifest
const MOSAICS = {
  "juanes": "juanes_thumb.jpg",
  "messi": "messi_thumb.jpg",
  "taylor": "taylor_thumb.jpg",
  "bob marley": "bob_marley_thumb.jpg",
  "shakira": "shakira_thumb.jpg",
  "queen": "queen_thumb.jpg",
  "pikachu": "pikachu_thumb.jpg",
  "einstein": "einstein_thumb.jpg",
  "dragon": "dragon_thumb.jpg",
};
const MOSAIC_BASE = "mosaics/";

let currentTarget = null;
let mosaicActive = false;
let viewerOpen = false;

// ── RENDER ──
function renderGrid(){
  const g = document.getElementById('grid');
  g.innerHTML = PHOTOS.map((u,i) =>
    `<div class="item" onclick="openPhoto(${i})"><img src="${u}" alt="" loading="${i<9?'eager':'lazy'}"></div>`
  ).join('');
}

// ── VIEWER ──
function openPhoto(idx){
  viewerOpen = true;
  mosaicActive = false;
  document.getElementById('vImg').src = PHOTOS[idx];
  document.getElementById('vImg').style.transform = 'scale(1)';
  document.getElementById('mosaicOverlay').classList.remove('active');
  document.getElementById('mosaicImg').src = '';
  document.getElementById('viewer').classList.add('open');
  document.getElementById('zoomHint').classList.remove('hidden');
}

function closeViewer(){
  viewerOpen = false;
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('mosaicOverlay').classList.remove('active');
}

// ── PINCH ZOOM ──
let startDist = 0;
const vw = document.getElementById('viewerImg');

vw.addEventListener('touchstart', e => {
  if(e.touches.length === 2){
    const dx = e.touches[0].cx - e.touches[1].cx || e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].cy - e.touches[1].cy || e.touches[0].clientY - e.touches[1].clientY;
    startDist = Math.sqrt(dx*dx + dy*dy);
  }
}, {passive:true});

vw.addEventListener('touchmove', e => {
  if(e.touches.length !== 2) return;
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const img = document.getElementById('vImg');

  if(!mosaicActive && startDist > 0 && dist / startDist < 0.55 && currentTarget){
    e.preventDefault();
    revealMosaic();
  } else if(!mosaicActive){
    const s = Math.max(0.3, Math.min(3, dist / (startDist || 1)));
    img.style.transform = `scale(${s})`;
  }
}, {passive:false});

// ── DOUBLE TAP ──
let lt = 0;
vw.addEventListener('click', () => {
  const n = Date.now();
  if(n - lt < 350 && currentTarget){
    if(mosaicActive) hideMosaic();
    else revealMosaic();
  }
  lt = n;
});

// ── MOSAIC ──
function revealMosaic(){
  if(!currentTarget) return;
  const key = currentTarget.toLowerCase().trim();
  const file = MOSAICS[key];
  if(!file){
    showToast('❌ No hay mosaico para: ' + currentTarget);
    return;
  }
  mosaicActive = true;
  document.getElementById('vImg').style.transform = 'scale(0.35)';
  const mImg = document.getElementById('mosaicImg');
  mImg.src = MOSAIC_BASE + file + '?t=' + Date.now();
  mImg.onload = () => {
    document.getElementById('mosaicOverlay').classList.add('active');
    document.getElementById('zoomHint').classList.add('hidden');
    showToast('🔮 ' + currentTarget);
  };
  mImg.onerror = () => {
    showToast('❌ Error cargando mosaico');
    mosaicActive = false;
  };
}

function hideMosaic(){
  mosaicActive = false;
  document.getElementById('mosaicOverlay').classList.remove('active');
  document.getElementById('vImg').style.transform = 'scale(1)';
  document.getElementById('zoomHint').classList.remove('hidden');
}

// ── INJECT ──
function processTarget(val){
  currentTarget = val;
  const r = document.getElementById('receiving');
  document.getElementById('rTarget').textContent = val;
  r.classList.add('show');
  setTimeout(() => {
    r.classList.remove('show');
    showToast('📡 ' + val);
    // If viewer is open, auto-reveal
    if(viewerOpen) revealMosaic();
  }, 1500);
}

function manualInject(){
  const v = prompt('Target:');
  if(v && v.trim()) processTarget(v.trim());
}

// ── CLOCK ──
function clock(){
  const n = new Date();
  document.getElementById('sTime').textContent =
    `${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
}
setInterval(clock,1000); clock();

// ── WEBSOCKET ──
let ws;
function connectWS(){
  try{
    ws = new WebSocket('wss://echo.websocket.events');
    ws.onmessage = e => {
      try{
        const d = JSON.parse(e.data);
        const v = d.value || d.target || d.text || d.message || e.data;
        if(typeof v === 'string' && v.length > 0) processTarget(v);
      } catch {
        if(typeof e.data === 'string' && e.data.length < 100) processTarget(e.data.trim());
      }
    };
    ws.onclose = () => setTimeout(connectWS, 3000);
  } catch(e){setTimeout(connectWS, 3000);}
}
connectWS();

// ── TOAST ──
let tt;
function showToast(m){
  clearTimeout(tt);
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  tt = setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('keydown', e => {
  if(e.key === 'i' || e.key === 'I') manualInject();
  if(e.key === 'Escape' && viewerOpen) closeViewer();
});

window.inject = processTarget;

renderGrid();
showToast('📸 ' + Object.keys(MOSAICS).length + ' targets');
</script>
</body>
</html>
