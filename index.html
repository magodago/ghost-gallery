<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3, user-scalable=yes, viewport-fit=cover">
<title>Fotos</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='4' fill='%23333'/><text x='8' y='13' font-size='12' fill='%23fff' text-anchor='middle'>🎞</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:manipulation}

/* ── STATUS BAR ── */
.status-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;height:54px;
  padding:12px 24px 0;display:flex;justify-content:space-between;
  font-size:12px;font-weight:600;color:#fff;
  background:linear-gradient(180deg,rgba(0,0,0,0.5) 0%,transparent 100%);
}
.status-bar .time{font-size:15px;font-weight:700;letter-spacing:0.3px;}
.status-icons{display:flex;align-items:center;gap:5px;font-size:13px;}
.status-icons svg{width:16px;height:16px;}

/* ── NAV BAR (iOS) ── */
.nav{
  position:fixed;top:54px;left:0;right:0;z-index:100;height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
}
.nav h2{font-size:28px;font-weight:700;letter-spacing:-0.3px;}
.nav-actions{display:flex;gap:16px;}
.nav-actions button{background:none;border:none;color:#007aff;font-size:15px;font-weight:500;padding:4px;cursor:pointer;}

/* ── TAB BAR ── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;height:84px;
  background:rgba(0,0,0,0.9);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border-top:1px solid rgba(255,255,255,0.08);
  display:flex;justify-content:space-around;align-items:flex-start;padding-top:6px;
}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:none;border:none;padding:4px 8px;min-width:60px;transition:opacity 0.2s;}
.tab-item span:first-child{font-size:22px;line-height:1;}
.tab-item span:last-child{font-size:10px;color:rgba(255,255,255,0.5);font-weight:500;letter-spacing:-0.2px;}
.tab-item.active span:last-child{color:#007aff;}
.tab-item.active span:first-child{filter:brightness(1.2);}

/* ── SCROLL CONTAINER ── */
.scroll-wrap{
  position:fixed;top:98px;left:0;right:0;bottom:84px;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
.scroll-wrap::-webkit-scrollbar{display:none;}

/* ── GRID (All Photos tab) ── */
.photo-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
  transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}
.photo-grid.mosaic{
  grid-template-columns:repeat(8,1fr) !important;
  gap:1px;
}
.photo-item{
  aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative;
  transition:border-radius 0.3s,transform 0.15s;
}
.photo-item:active{transform:scale(0.96);}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block;transition:all 0.3s;}

/* ── SECTION HEADERS (Photos tab) ── */
.section-header{padding:20px 16px 6px;font-size:17px;font-weight:700;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.section-header span{font-size:13px;font-weight:400;color:#007aff;}

/* ── ALBUMS TAB ── */
.album-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:8px 16px 24px;}
.album-item{cursor:pointer;}
.album-thumb{width:100%;aspect-ratio:1;border-radius:12px;overflow:hidden;background:rgba(255,255,255,0.05);margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:36px;}
.album-thumb img{width:100%;height:100%;object-fit:cover;}
.album-name{font-size:13px;font-weight:600;color:#fff;}
.album-count{font-size:11px;color:rgba(255,255,255,0.4);}

/* ── PHOTO VIEWER ── */
.viewer{
  position:fixed;inset:0;z-index:300;
  background:#000;display:none;flex-direction:column;
}
.viewer.open{display:flex;}
.viewer-top{
  position:absolute;top:0;left:0;right:0;z-index:10;height:100px;
  background:linear-gradient(180deg,rgba(0,0,0,0.5),transparent);
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:54px 16px 0;
}
.viewer-top button{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;}
.viewer-img-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.viewer-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;transition:transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);}

/* ── MOSAIC OVERLAY (inside viewer) ── */
.mosaic-layer{
  position:absolute;inset:0;z-index:5;
  display:grid;gap:0;
  opacity:0;pointer-events:none;
  transition:opacity 0.4s ease,transform 0.4s ease;
  transform:scale(1.1);
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(12,1fr);
}
.mosaic-layer.active{opacity:1;pointer-events:auto;transform:scale(1);}
.mosaic-tile{background:var(--c,#333);}

/* ── RECEIVING OVERLAY ── */
.receive-overlay{
  position:fixed;inset:0;z-index:250;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;
}
.receive-overlay.show{display:flex;}
.receive-pulse{width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:28px;animation:recPulse 1.5s ease-in-out infinite;}
@keyframes recPulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.1);opacity:1}}
.receive-overlay p{font-size:15px;color:rgba(255,255,255,0.5);}
.receive-overlay .name{font-size:32px;font-weight:700;color:#fff;margin-top:4px;}

/* ── TOAST ── */
.toast{
  position:fixed;top:120px;left:50%;transform:translateX(-50%) translateY(-20px);
  z-index:400;padding:10px 20px;border-radius:16px;
  background:rgba(40,40,40,0.95);backdrop-filter:blur(20px);
  font-size:13px;color:#fff;
  opacity:0;pointer-events:none;transition:all 0.35s cubic-bezier(0.16,1,0.3,1);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── HIDDEN ── */
.hidden{display:none !important;}
</style>
</head>
<body>

<!-- STATUS BAR -->
<div class="status-bar">
  <span class="time" id="statusTime">9:41</span>
  <div class="status-icons">
    <span id="batPct">84%</span>
    <svg viewBox="0 0 24 12"><rect x="0.5" y="0.5" width="19" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1"/><rect x="20" y="3.5" width="2" height="5" rx="0.8" fill="currentColor"/><rect x="2" y="2.5" width="15" height="7" rx="1" fill="currentColor"/></svg>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <h2>Fotos</h2>
  <div class="nav-actions">
    <button id="btnSelect">Seleccionar</button>
    <button id="btnInject" onclick="manualInject()" style="color:#ff9500;">+</button>
  </div>
</div>

<!-- SCROLL CONTENT -->
<div class="scroll-wrap" id="scrollWrap">
  <!-- PHOTOS TAB -->
  <div id="photosTab">
    <div class="section-header">2026 <span>▼</span></div>
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <!-- ALBUMS TAB (hidden by default) -->
  <div id="albumsTab" class="hidden">
    <div class="album-grid" id="albumGrid"></div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar" id="tabBar">
  <button class="tab-item active" data-tab="photos" onclick="switchTab('photos')"><span>🖼️</span><span>Fotos</span></button>
  <button class="tab-item" data-tab="forYou" onclick="switchTab('forYou')"><span>💎</span><span>Para ti</span></button>
  <button class="tab-item" data-tab="albums" onclick="switchTab('albums')"><span>📁</span><span>Álbumes</span></button>
  <button class="tab-item" data-tab="search" onclick="switchTab('search')"><span>🔍</span><span>Buscar</span></button>
</div>

<!-- PHOTO VIEWER -->
<div class="viewer" id="viewer">
  <div class="viewer-top">
    <button onclick="closeViewer()">✕</button>
    <button onclick="manualInject()" style="color:#ff9500;">+</button>
  </div>
  <div class="viewer-img-wrap" id="viewerImgWrap">
    <img id="viewerImg" src="" alt="">
    <!-- Mosaic layer overlaid on photo -->
    <div class="mosaic-layer" id="mosaicLayer"></div>
  </div>
</div>

<!-- RECEIVING OVERLAY -->
<div class="receive-overlay" id="receiveOverlay">
  <div class="receive-pulse">📡</div>
  <p>Recibiendo señal...</p>
  <div class="name" id="receiveName"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
//  GHOST GALLERY — iOS 26 Photos Clone
// ═══════════════════════════════════════

// ── YOUR PHOTOS (replace with yours!) ──
// Use 100+ photos HERE for the gallery
const MY_PHOTOS = Array.from({length:100}, (_,i) => `https://picsum.photos/id/${(i%500)+1}/400/400`);

// ── STATE ──
let currentTab = 'photos';
let currentTarget = null;
let viewerOpen = false;
let mosaicVisible = false;

// ── RENDER PHOTOS GRID ──
function renderPhotos(){
  const grid = document.getElementById('photoGrid');
  // Show first 60 photos organized like iOS (recent at top)
  const photos = MY_PHOTOS.slice(0, 60);
  grid.innerHTML = photos.map((url,i) =>
    `<div class="photo-item" onclick="openPhoto(${i})">
      <img src="${url}" alt="" loading="${i<12?'eager':'lazy'}">
    </div>`
  ).join('');
}

// ── RENDER ALBUMS ──
function renderAlbums(){
  const grid = document.getElementById('albumGrid');
  const albums = [
    {name:'Recents',count:MY_PHOTOS.length,icon:'🖼️'},
    {name:'Favoritos',count:12,icon:'⭐'},
    {name:'Selfies',count:8,icon:'🤳'},
    {name:'Capturas',count:23,icon:'📱'},
    {name:'Vídeos',count:15,icon:'🎬'},
    {name:'Duplicados',count:3,icon:'📀'},
    {name:'Importados',count:7,icon:'📥'},
    {name:'Ocultos',count:2,icon:'👁️'},
  ];
  grid.innerHTML = albums.map(a =>
    `<div class="album-item">
      <div class="album-thumb">${a.icon}</div>
      <div class="album-name">${a.name}</div>
      <div class="album-count">${a.count} elementos</div>
    </div>`
  ).join('');
}

// ── SWITCH TABS ──
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('photosTab').classList.toggle('hidden', tab !== 'photos');
  document.getElementById('albumsTab').classList.toggle('hidden', tab !== 'albums');
}

// ── OPEN PHOTO VIEWER ──
function openPhoto(index){
  viewerOpen = true;
  mosaicVisible = false;
  const viewer = document.getElementById('viewer');
  const img = document.getElementById('viewerImg');
  const layer = document.getElementById('mosaicLayer');
  img.src = MY_PHOTOS[index];
  img.style.transform = 'scale(1)';
  layer.classList.remove('active');
  layer.innerHTML = '';
  viewer.classList.add('open');
}

function closeViewer(){
  viewerOpen = false;
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('mosaicLayer').classList.remove('active');
}

// ── PINCH TO REVEAL MOSAIC (inside viewer) ──
let pinchStartDist = 0;
let pinching = false;

document.getElementById('viewerImgWrap').addEventListener('touchstart', (e) => {
  if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartDist = Math.sqrt(dx*dx + dy*dy);
    pinching = true;
  }
}, {passive:true});

document.getElementById('viewerImgWrap').addEventListener('touchmove', (e) => {
  if(e.touches.length === 2 && pinching && currentTarget){
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const ratio = dist / pinchStartDist;
    const img = document.getElementById('viewerImg');

    if(ratio < 0.5 && !mosaicVisible){
      // Pinch IN → reveal mosaic
      mosaicVisible = true;
      img.style.transform = 'scale(0.4)';
      showMosaic();
      showToast('🔮 ' + currentTarget);
    } else if(ratio > 0.8 && mosaicVisible){
      // Zoom OUT → back to photo
      mosaicVisible = false;
      img.style.transform = 'scale(1)';
      document.getElementById('mosaicLayer').classList.remove('active');
    } else if(!mosaicVisible){
      // Normal zoom
      const s = Math.max(0.3, Math.min(3, ratio));
      img.style.transform = `scale(${s})`;
    }
  }
}, {passive:false});

document.addEventListener('touchend', () => { pinching = false; pinchStartDist = 0; }, {passive:true});

// ── DOUBLE TAP TO ZOOM/ZOUT ──
let lastTap = 0;
document.getElementById('viewerImgWrap').addEventListener('click', (e) => {
  const now = Date.now();
  if(now - lastTap < 400 && currentTarget){
    // Double tap → toggle mosaic
    const layer = document.getElementById('mosaicLayer');
    const img = document.getElementById('viewerImg');
    if(!mosaicVisible){
      mosaicVisible = true;
      img.style.transform = 'scale(0.3)';
      showMosaic();
      showToast('🔮 ' + currentTarget);
    } else {
      mosaicVisible = false;
      img.style.transform = 'scale(1)';
      layer.classList.remove('active');
    }
  }
  lastTap = now;
});

// ── SHOW MOSAIC ──
function showMosaic(){
  if(!currentTarget) return;
  const layer = document.getElementById('mosaicLayer');
  const cols = 8, rows = 12;
  layer.style.gridTemplateColumns = `repeat(${cols},1fr)`;
  layer.style.gridTemplateRows = `repeat(${rows},1fr)`;

  // Generate mosaic tiles based on target hash
  const hash = currentTarget.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
  let html = '';
  for(let r = 0; r < rows; r++){
    for(let c = 0; c < cols; c++){
      const cx = cols/2, cy = rows/2;
      const dist = Math.sqrt((c-cx)**2 + (r-cy)**2) / Math.min(cols,rows) * 3;
      const angle = Math.atan2(r-cy, c-cx) + hash * 0.01;
      // Simulate a face shape
      const face = Math.exp(-((c-cx)**2/(2*2.5)+(r-cy)**2/(2*3.5)));
      const rCol = Math.floor(180 + 75 * Math.sin(angle + dist * 2));
      const gCol = Math.floor(140 + 60 * Math.cos(dist * 1.5 + hash * 0.005));
      const bCol = Math.floor(120 + 80 * Math.sin(dist * 2.5 + hash * 0.008));
      const a = 0.7 + 0.3 * face;
      html += `<div class="mosaic-tile" style="--c:rgba(${rCol},${gCol},${bCol},${a})"></div>`;
    }
  }
  layer.innerHTML = html;
  // Activate with stagger
  requestAnimationFrame(() => layer.classList.add('active'));
}

// ── RECEIVE TARGET ──
function processTarget(value){
  currentTarget = value;
  const overlay = document.getElementById('receiveOverlay');
  document.getElementById('receiveName').textContent = value;
  overlay.classList.add('show');

  setTimeout(() => {
    overlay.classList.remove('show');
    showToast('📡 ' + value);
  }, 1800);
}

// ── MANUAL INJECT ──
function manualInject(){
  const v = prompt('Target:');
  if(v && v.trim()) processTarget(v.trim());
}

// ── CLOCK ──
function updateClock(){
  const now = new Date();
  document.getElementById('statusTime').textContent =
    `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── WEBSOCKET ──
let ws;
function connectWS(){
  try{
    ws = new WebSocket('wss://echo.websocket.events');
    ws.onmessage = (e) => {
      try{
        const d = JSON.parse(e.data);
        const v = d.value || d.target || d.text || d.message || e.data;
        if(typeof v === 'string' && v.length > 0 && v.length < 100) processTarget(v);
      } catch {
        if(typeof e.data === 'string' && e.data.length < 100) processTarget(e.data.trim());
      }
    };
    ws.onclose = () => setTimeout(connectWS, 3000);
  } catch(e){ setTimeout(connectWS, 3000); }
}
connectWS();

// ── TOAST ──
let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── KEYBOARD ──
document.addEventListener('keydown', (e) => {
  if(e.key === 'i' || e.key === 'I') manualInject();
  if(e.key === 'Escape' && viewerOpen) closeViewer();
});

// ── EXPOSE ──
window.inject = processTarget;

// ── INIT ──
renderPhotos();
renderAlbums();
showToast('📸 Fotos');
</script>
</body>
</html>
